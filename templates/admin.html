{% extends "base.html" %}
{% block title %}Admin - Online Shop{% endblock %}
{% block content %}
<h1>Admin Dashboard</h1>

<h2>Add Product</h2>
<form method="post">
    <label>Name<br><input type="text" name="name" required></label><br>
    <label>Price<br><input type="number" step="0.01" name="price" required></label><br>
    <label>Category<br><input type="text" name="category"></label><br>
    <label>Image URL<br><input type="text" name="image_url"></label><br>
    <label>Description<br><textarea name="description"></textarea></label><br><br>
    <button type="submit">Add</button>
</form>

<h2>All Products</h2>
<ul>
    {% for p in products %}
    <li>{{ p.id }} - {{ p.name }} - ${{ "%.2f"|format(p.price) }}</li>
    {% endfor %}
</ul>
{% endblock %}
