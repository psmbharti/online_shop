{% extends "base.html" %}
{% block title %}Shop - Online Shop{% endblock %}
{% block content %}
<h1>Shop {% if category %}- {{ category }}{% endif %}</h1>
<div class="products-grid">
    {% for p in products %}
    <div class="product-card">
        <img src="{{ p.image_url }}" alt="{{ p.name }}">
        <h3>{{ p.name }}</h3>
        <p>${{ "%.2f"|format(p.price) }}</p>
        <a href="{{ url_for('product_detail', product_id=p.id) }}">View</a>
    </div>
    {% endfor %}
</div>
{% endblock %}
